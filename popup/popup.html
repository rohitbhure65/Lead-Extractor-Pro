<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Extractor Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app-container">
    <!-- Sidebar: Controls & Settings -->
    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">L</div>
          <div class="brand-info">
            <h1>Lead Extractor</h1>
            <span class="version" id="versionBadge">v1.0.0</span>
          </div>
        </div>
      </header>

      <div class="sidebar-scroll">
        <section class="extraction-controls">
          <div class="section-title">Extraction Settings</div>
          
          <div class="settings-grid">
            <div class="setting-item">
              <label for="maxLeadsInput">Max Results</label>
              <input type="number" id="maxLeadsInput" min="1" max="5000" value="100">
            </div>

            <div class="setting-item">
              <label for="countryCodeInput">Country Code</label>
              <div class="input-with-prefix">
                <span class="prefix">+</span>
                <input type="text" id="countryCodeInput" value="91" maxlength="4">
              </div>
            </div>
          </div>

          <div class="toggle-group">
            <label class="toggle">
              <input type="checkbox" id="noLimitInput">
              <span class="slider"></span>
              <span class="label">No Limit</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="requirePhoneInput">
              <span class="slider"></span>
              <span class="label">Phone Only</span>
            </label>
          </div>

          <div class="setting-item">
            <label for="whatsAppMessageInput">WhatsApp Template</label>
            <textarea id="whatsAppMessageInput" rows="2"></textarea>
          </div>

          <div class="action-group">
            <button class="btn-primary" id="startExtraction">
              <span class="icon">▶</span> Start Scan
            </button>
            <button class="btn-outline" id="deduplicate">
              <span class="icon">⟳</span> Clean Duplicates
            </button>
            <button class="btn-save" id="saveCurrentLead" title="Save current page (Ctrl+S)">
              <span class="icon">💾</span> Save Current
            </button>
          </div>
        </section>

        <div class="status-box">
          <div class="status-label">Status</div>
          <div class="status-text" id="extractionStatus">Ready</div>
          <div class="progress-wrap" id="progressContainer" style="display: none;">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-pct" id="progressText">0%</span>
          </div>
        </div>
      </div>
      
      <footer class="sidebar-footer">
        <p>Created by Rohit Bhure</p>
      </footer>
    </aside>

    <!-- Main Content: Dashboard -->
    <main class="main-content">
      <header class="content-header">
        <div class="tabs">
          <button class="tab active" id="tabExtracted">Extracted</button>
          <button class="tab" id="tabSaved">Saved</button>
        </div>
        <div class="lead-info-badge">
          <span class="count" id="leadCount">0 leads</span>
        </div>
      </header>

      <div class="content-body">
        <!-- Extracted Leads View -->
        <div id="extractedLeadsContainer" class="view-container active">
          <div class="toolbar">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search leads...">
            </div>
            <select id="filterSelect" class="filter-dropdown">
              <option value="all">All Leads</option>
              <option value="email">Has Email</option>
              <option value="phone">Has Phone</option>
              <option value="company">Has Company</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>

          <div class="leads-list" id="leadsList">
            <div class="empty-state">
              <div class="empty-icon">📂</div>
              <p>No leads found. Start a scan to find opportunities.</p>
            </div>
          </div>
          <div class="list-footer" id="listStatus"></div>
        </div>

        <!-- Saved Leads View -->
        <div id="savedLeadsContainer" class="view-container">
          <div class="table-scroll">
            <table class="saved-table">
              <thead>
                <tr>
                  <th>Business Name</th>
                </tr>
              </thead>
              <tbody id="savedLeadsBody">
                <tr><td class="empty-td">No manually saved leads yet.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Sticky Footer Actions -->
      <footer class="export-footer">
        <button class="btn-export csv" id="exportCSV">
          <span class="icon">📥</span> CSV
        </button>
        <button class="btn-export excel" id="exportExcel">
          <span class="icon">📊</span> Excel
        </button>
        <button class="btn-danger-link" id="clearAll">
          <span class="icon">🗑</span> Clear All
        </button>
      </footer>
    </main>

    <button class="floating-close" id="closeWindowBtn">&times;</button>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="addLeadModal" style="display: none;">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Add New Lead</h2>
        <button class="close-modal" id="closeModal">&times;</button>
      </div>
      <form id="addLeadForm" class="modal-form">
        <div class="form-row">
          <div class="form-field"><label>Name</label><input type="text" name="name" required></div>
          <div class="form-field"><label>Email</label><input type="email" name="email"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Phone</label><input type="tel" name="phone"></div>
          <div class="form-field"><label>Company</label><input type="text" name="company"></div>
        </div>
        <div class="form-field"><label>Website</label><input type="url" name="website"></div>
        <div class="form-field"><label>Address</label><input type="text" name="address"></div>
        <button type="submit" class="btn-submit">Add Lead</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="editLeadModal" style="display: none;">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Edit Lead</h2>
        <button class="close-modal" id="closeEditModal">&times;</button>
      </div>
      <form id="editLeadForm" class="modal-form">
        <input type="hidden" name="id">
        <div class="form-row">
          <div class="form-field"><label>Name</label><input type="text" name="name" required></div>
          <div class="form-field"><label>Email</label><input type="email" name="email"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Phone</label><input type="tel" name="phone"></div>
          <div class="form-field"><label>Company</label><input type="text" name="company"></div>
        </div>
        <div class="form-field"><label>Website</label><input type="url" name="website"></div>
        <div class="form-field"><label>Address</label><input type="text" name="address"></div>
        <button type="submit" class="btn-submit">Update Lead</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="savedLeadViewModal" style="display: none;">
    <div class="modal-card wide">
      <div class="modal-header">
        <h2>Lead Details</h2>
        <button class="close-modal" id="closeSavedLeadViewModal">&times;</button>
      </div>
      <div id="savedLeadViewContent" class="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../libs/papaparse.min.js"></script>
  <script src="../libs/xlsx.min.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="../utils/extractor.js"></script>
  <script src="../utils/deduplicator.js"></script>
  <script src="popup.js"></script>
</body>

</html></body>

</html>
